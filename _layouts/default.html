<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#EDE7E3">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{{ page.title | default: site.title }} · Good Morning</title>
    <link rel="icon" href="{{ '/assets/images/sun-logo.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </head>
  <body class="{% if page.home %}home{% else %}document-page{% endif %}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="sunrise" aria-hidden="true">
      <img src="{{ '/assets/images/sunrise.svg' | relative_url }}" alt="">
    </div>

    <header class="site-header" data-reveal>
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Good Morning home">
        <img src="{{ '/assets/images/sun-logo.svg' | relative_url }}" alt="">
        <span>Good Morning</span>
      </a>
      <nav aria-label="Main navigation">
        <a {% if page.url contains '/privacy-policy' %}aria-current="page"{% endif %} href="{{ '/privacy-policy/' | relative_url }}">Privacy</a>
        <a {% if page.url contains '/terms-of-use' %}aria-current="page"{% endif %} href="{{ '/terms-of-use/' | relative_url }}">Terms</a>
        <a {% if page.url contains '/support' %}aria-current="page"{% endif %} href="{{ '/support/' | relative_url }}">Support</a>
      </nav>
    </header>

    <main id="main-content" class="site-main">
      {% if page.home %}
        {{ content }}
      {% else %}
        <article class="document-card" data-reveal>
          <div class="document-label">Good Morning · {{ page.category | default: 'Legal' }}</div>
          {{ content }}
        </article>
      {% endif %}
    </main>

    <footer class="site-footer" data-reveal>
      <div>
        <span class="footer-sun" aria-hidden="true"></span>
        <span>Start your day with intention.</span>
      </div>
      <p>© <span id="year">2026</span> Christopher Ambrose</p>
    </footer>
  </body>
</html>
